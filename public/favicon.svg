<?xml version="1.0" encoding="UTF-8"?>
<!--
  Project favicon: original abstract mark (typing dots on keyboard-inspired tile).
  Not derived from third-party logos or trademarked artwork.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="App icon">
  <defs>
    <linearGradient id="qj-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#qj-bg)"/>
  <!-- subtle key-cap highlight -->
  <rect x="5" y="6" width="22" height="18" rx="4" fill="#ffffff" fill-opacity="0.12"/>
  <!-- typing indicator -->
  <circle cx="11" cy="16" r="2.2" fill="#ecfdf5"/>
  <circle cx="16" cy="16" r="2.2" fill="#ecfdf5"/>
  <circle cx="21" cy="16" r="2.2" fill="#ecfdf5"/>
</svg>
